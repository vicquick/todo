services:
  todo-backend:
    container_name: todo-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    ports:
      - 8888:80
    volumes:
      - /home/virajs-desktop/git-repo/todo-api/backend/app:/app
    command: ["fastapi", "run", "main.py", "--port", "80", "--reload"]
    env_file:
      - backend/.env
    networks:
      - nginx
  todo-frontend:
    container_name: todo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - 5173:80
    env_file:
      - frontend/.env

    networks:
      - nginx
  mongo:
    container_name: todo-database
    image: mongo:8.3.2
    ports:
      - 20000:27017
    env_file:
      - .env

    networks:
      - nginx
networks:
  nginx:
